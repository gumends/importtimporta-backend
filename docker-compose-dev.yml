services:
  db:
    image: mysql:8.0
    container_name: mysql_importt
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: importtimporta
      MYSQL_USER: importt
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis_importt
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq_importt
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq

volumes:
  mysqldata:
  redisdata:
  rabbitmqdata:
